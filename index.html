<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>抛硬币 · 帮你做决定</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F1730;
    --bg-glow:#1B2747;
    --panel:#161F3B;
    --gold:#F2B705;
    --gold-deep:#C98F00;
    --gold-ink:#3A2A00;
    --slate:#9FB3C8;
    --slate-deep:#62748F;
    --slate-ink:#1C2738;
    --ink:#EAF0FA;
    --muted:#7C8AA8;
    --line:#283353;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    min-height:100%;
  }

  body{
    background:
      radial-gradient(circle at 50% 12%, var(--bg-glow), var(--bg) 62%);
    color:var(--ink);
    font-family:'Inter', system-ui, -apple-system, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:32px 20px;
  }

  main{
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:28px;
  }

  .eyebrow{
    margin:0;
    font-size:0.95rem;
    font-weight:500;
    color:var(--muted);
    letter-spacing:0.01em;
    text-align:center;
  }

  .coin-stage{
    perspective:1000px;
    padding:8px;
  }

  .coin{
    position:relative;
    width:clamp(140px, 42vw, 190px);
    height:clamp(140px, 42vw, 190px);
    background:none;
    border:none;
    padding:0;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }

  .coin:disabled{ cursor:default; }

  .coin-inner{
    position:relative;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    transition:transform 0.9s cubic-bezier(.2,.8,.2,1);
    border-radius:50%;
  }

  .face{
    position:absolute;
    inset:0;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    backface-visibility:hidden;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(1.4rem, 6vw, 1.8rem);
    letter-spacing:0.04em;
    box-shadow:
      inset 0 0 0 5px rgba(0,0,0,0.18),
      inset 0 6px 14px rgba(255,255,255,0.25),
      inset 0 -10px 18px rgba(0,0,0,0.25),
      0 10px 26px rgba(0,0,0,0.45);
  }

  .front{
    background:radial-gradient(circle at 35% 28%, #FFE08A, var(--gold) 55%, var(--gold-deep) 100%);
    color:var(--gold-ink);
  }

  .back{
    transform:rotateY(180deg);
    background:radial-gradient(circle at 35% 28%, #D7E3EE, var(--slate) 55%, var(--slate-deep) 100%);
    color:var(--slate-ink);
  }

  .coin:focus-visible .coin-inner{
    outline:2px solid var(--gold);
    outline-offset:6px;
  }

  .result{
    margin:0;
    min-height:1.2em;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(1.8rem, 8vw, 2.4rem);
    letter-spacing:0.03em;
  }

  .result[data-result="yes"]{ color:var(--gold); }
  .result[data-result="no"]{ color:var(--slate); }

  .history-block{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }

  .history-label{
    margin:0;
    font-size:0.78rem;
    color:var(--muted);
    letter-spacing:0.08em;
    text-transform:uppercase;
  }

  .history{
    display:flex;
    gap:10px;
  }

  .slot{
    width:46px;
    height:46px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:0.78rem;
    border:1px solid var(--line);
    color:var(--muted);
    background:var(--panel);
  }

  .slot.yes{
    background:var(--gold);
    color:var(--gold-ink);
    border-color:var(--gold-deep);
  }

  .slot.no{
    background:var(--slate);
    color:var(--slate-ink);
    border-color:var(--slate-deep);
  }

  .tally{
    margin:0;
    font-size:0.85rem;
    color:var(--muted);
  }

  .clear{
    background:none;
    border:1px solid var(--line);
    color:var(--muted);
    font-family:'Inter', sans-serif;
    font-size:0.85rem;
    font-weight:500;
    padding:9px 22px;
    border-radius:999px;
    cursor:pointer;
    transition:border-color .2s, color .2s;
  }

  .clear:hover{
    border-color:var(--muted);
    color:var(--ink);
  }

  .clear:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:2px;
  }

  @media (prefers-reduced-motion: reduce){
    .coin-inner{ transition:transform 0.25s linear; }
  }
</style>
</head>
<body>
  <main>
    <p class="eyebrow">拿不定主意？丢一次就知道。</p>

    <div class="coin-stage">
      <button class="coin" id="coin" aria-label="点击抛硬币">
        <div class="coin-inner" id="coinInner">
          <div class="face front">YES</div>
          <div class="face back">NO</div>
        </div>
      </button>
    </div>

    <p class="result" id="result" aria-live="polite">点击硬币开始</p>

    <div class="history-block">
      <p class="history-label">最近三次</p>
      <div class="history" id="history"></div>
      <p class="tally" id="tally">还没有记录</p>
    </div>

    <button class="clear" id="clear">清空记录</button>
  </main>

<script>
  const coin = document.getElementById('coin');
  const coinInner = document.getElementById('coinInner');
  const resultEl = document.getElementById('result');
  const historyEl = document.getElementById('history');
  const tallyEl = document.getElementById('tally');
  const clearBtn = document.getElementById('clear');

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let rotation = 0;
  let history = []; // 最近的在最前面，最多 3 个

  function flip(){
    coin.disabled = true;
    resultEl.removeAttribute('data-result');
    resultEl.textContent = '抛掷中…';

    const result = Math.random() < 0.5 ? 'YES' : 'NO';
    const spins = reduceMotion ? 1 : 4 + Math.floor(Math.random() * 3); // 4~6 圈
    const addition = spins * 360 + (result === 'NO' ? 180 : 0);
    rotation += addition;
    coinInner.style.transform = `rotateY(${rotation}deg)`;

    const duration = reduceMotion ? 260 : 900;
    setTimeout(() => {
      coin.disabled = false;
      resultEl.textContent = result;
      resultEl.dataset.result = result.toLowerCase();
      history.unshift(result);
      history = history.slice(0, 3);
      renderHistory();
    }, duration);
  }

  function renderHistory(){
    historyEl.innerHTML = '';
    for (let i = 0; i < 3; i++){
      const slot = document.createElement('div');
      slot.className = 'slot';
      const val = history[i];
      if (val){
        slot.textContent = val;
        slot.classList.add(val === 'YES' ? 'yes' : 'no');
      } else {
        slot.textContent = '–';
      }
      historyEl.appendChild(slot);
    }

    if (history.length === 0){
      tallyEl.textContent = '还没有记录';
    } else {
      const yes = history.filter(v => v === 'YES').length;
      const no = history.filter(v => v === 'NO').length;
      tallyEl.textContent = `YES ${yes} · NO ${no}`;
    }
  }

  clearBtn.addEventListener('click', () => {
    history = [];
    renderHistory();
    resultEl.textContent = '点击硬币开始';
    resultEl.removeAttribute('data-result');
  });

  coin.addEventListener('click', flip);

  renderHistory();
</script>
</body>
</html>
